<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属音乐空间</title>
    <style>
        body {
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            margin: 0; 
            background-color: #f1f8f1; /* 柔和的植物浅绿，视觉上很干净 */
            font-family: sans-serif;
        }
        .card {
            background: white; 
            padding: 30px 40px; 
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06); 
            text-align: center;
        }
        h2 { 
            color: #2e7d32; 
            margin-top: 0; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎵 今天的特别曲目</h2>
        
        <audio controls autoplay src="https://你的音频链接.mp3"></audio>
        
    </div>
</body>
</html>
