<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属音乐空间</title>
    <style>
        /* 定义基础颜色和全局样式 */
        :root {
            --primary: #4CAF50; /* 柔和的植物绿 */
            --bg: #f4f9f4;
            --text: #333;
        }
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: var(--bg);
            font-family: 'PingFang SC', sans-serif;
            overflow: hidden; /* 防止手机端页面上下滑动 */
        }
        
        /* 卡片主体 */
        .player-card {
            background: white; width: 80%; max-width: 320px; 
            padding: 40px 30px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.1); 
            text-align: center;
        }
        
        /* 旋转的“唱片”封面 */
        .cover {
            width: 140px; height: 140px; background: #e8f5e9; 
            border-radius: 50%; margin: 0 auto 30px; 
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            transition: transform 0.5s ease;
        }
        
        /* 定义旋转动画 */
        .spin { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* 文字排版 */
        h2 { color: var(--text); margin: 0 0 10px; font-size: 22px; }
        p.subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        
        /* 自定义播放按钮 */
        .play-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 16px;
            font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }
        .play-btn:active { transform: scale(0.95); /* 点击时的缩放反馈 */ }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="cover" id="coverArt">🌿</div>
        
        <h2>专属纪念曲目</h2>
        <p class="subtitle" id="message">轻触下方按钮，开启声音</p>
        
        <audio id="audio" src="./music1.mp3"></audio>
        
        <button class="play-btn" id="playBtn">▶ 播放音乐</button>
    </div>

    <script>
        // 获取页面上的元素
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const coverArt = document.getElementById('coverArt');
        const message = document.getElementById('message');

        let isPlaying = false;

        // 监听按钮的点击事件
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                // 如果正在播放，则暂停
                audio.pause();
                playBtn.innerText = '▶ 播放音乐';
                coverArt.classList.remove('spin'); // 停止旋转
                message.innerText = '音乐已暂停';
            } else {
                // 如果是暂停状态，则播放
                audio.play();
                playBtn.innerText = '⏸ 暂停播放';
                coverArt.classList.add('spin'); // 开始旋转
                message.innerText = '正在播放中...';
            }
            isPlaying = !isPlaying; // 切换状态记录
        });

        // 监听音乐自然播放结束的事件
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerText = '▶ 播放音乐';
            coverArt.classList.remove('spin');
            message.innerText = '播放完毕';
        });
    </script>
</body>
</html>
